<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chat - Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group .hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .example-phone {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: #495057;
            margin-top: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="logo">
            <h1>Chat Setup</h1>
            <p>Enter your test customer details</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/test/setup">
            <div class="form-group">
                <label for="phone_number">WhatsApp Phone Number</label>
                <input
                    type="text"
                    id="phone_number"
                    name="phone_number"
                    placeholder="e.g., 628123456789"
                    required
                    autofocus
                >
                <div class="hint">Format: Country code + number (without + or spaces)</div>
            </div>

            <div class="form-group">
                <label for="contact_name">Contact Name</label>
                <input
                    type="text"
                    id="contact_name"
                    name="contact_name"
                    placeholder="e.g., Test User"
                    required
                >
                <div class="hint">This name will be used in the conversation</div>
            </div>

            <button type="submit" class="btn-primary">Start Chat</button>
        </form>

        <div class="info-box">
            <strong>Example phone number:</strong>
            <div class="example-phone">628123456789</div>
            <div style="margin-top: 8px;">
                This will simulate a WhatsApp message from this number to the AI agent.
            </div>
        </div>
    </div>

    <script>
        // Auto-format phone number (remove spaces, +, etc.)
        const phoneInput = document.getElementById('phone_number');
        phoneInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[\s\+\-\(\)]/g, '');
        });
    </script>
</body>
</html>
